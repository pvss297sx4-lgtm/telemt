name: Check

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
# ==========================
# Formatting
# ==========================
  fmt:
    name: Fmt
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - run: cargo fmt -- --check

# ==========================
# Tests
# ==========================
  test:
    name: Test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write
      checks: write

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Build tests
        run: cargo test --no-run -j $(nproc)

      - name: Run tests
        run: cargo nextest run --all-features --no-fail-fast

# ==========================
# Clippy
# ==========================
  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - run: cargo clippy -- --cap-lints warn

# ==========================
# Udeps
# ==========================
  udeps:
    name: Udeps
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-udeps
        run: cargo install cargo-udeps || true

      # тоже не валит билд
      - run: cargo udeps || true
